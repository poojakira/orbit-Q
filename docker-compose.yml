version: '3.8'

services:
  ingestion:
    build: .
    command: python -m orbit_q.simulator.mock_telemetry
    environment:
      - PYTHONUNBUFFERED=1

  orchestrator:
    build: .
    command: python -m orbit_q.orchestrator.ml_orchestrator
    environment:
      - PYTHONUNBUFFERED=1

  ui:
    build: .
    ports:
      - "8501:8501"
    command: streamlit run src/orbit_q/dashboard/dashboard.py --server.port=8501 --server.address=0.0.0.0
    environment:
      - PYTHONUNBUFFERED=1